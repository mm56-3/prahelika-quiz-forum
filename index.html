<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <h1 id="PRAHELIKA QUIZ FORUM"></h1>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #020617 80%); 
            color: white; 
            min-height: 100vh; 
        }

        /* SMOOTH TRANSITIONS RESTORED */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        #display-title { text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" id="nav-logo" class="w-10 h-10 object-contain" onerror="this.src='https://ui-avatars.com/api/?name=P&background=06b6d4&color=fff'">
            <span class="text-xl font-black text-cyan-400">PRAHELIKA</span>
        </div>
        <div class="hidden md:flex gap-6 text-xs font-bold uppercase">
            <a href="#home">Home</a>
            <a href="#gallery">Gallery</a>
            <a href="#executives">Executives</a>
            <a href="#leaderboard">Leaderboard</a>
            <a href="#contacts">Contacts</a>
        </div>
        <button id="quiz-trigger" class="bg-cyan-500 text-blue-950 px-5 py-2 rounded-full font-bold hover:bg-cyan-400 transition-all">START QUIZ</button>
    </nav>

    <section id="home" class="pt-40 pb-20 px-6 text-center">
        <h1 id="display-title" class="text-5xl md:text-7xl font-black mb-6 animate__animated animate__fadeInDown">PRAHELIKA QUIZ FORUM DARRANG</h1>
        <p id="display-desc" class="text-gray-400 max-w-2xl mx-auto mb-10">Unleash your intellect with Prahelika.</p>
        
        <div class="max-w-4xl mx-auto rounded-3xl overflow-hidden shadow-2xl border border-white/10 animate__animated animate__zoomIn">
            <img id="special-team-img" src="special-team.jpg" class="w-full h-auto object-cover min-h-[300px]" onerror="this.src='https://via.placeholder.com/1200x600/0d122b/06b6d4?text=Prahelika+Quiz+Forum+Darrang'">
        </div>
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-3xl font-bold text-center mb-10 uppercase tracking-widest">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-8"></div>
    </section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
        authDomain: "prahelika-fbf98.firebaseapp.com",
        projectId: "prahelika-fbf98",
        storageBucket: "prahelika-fbf98.firebasestorage.app",
        messagingSenderId: "21670057223",
        appId: "1:21670057223:web:d20225509d824505cb61a2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Update the Title and Description automatically
    onSnapshot(doc(db, "website", "data"), (doc) => {
        if (doc.exists()) {
            const data = doc.data();
            if(document.getElementById('display-title')) {
                document.getElementById('display-title').innerText = data.title;
            }
            if(document.getElementById('display-desc')) {
                document.getElementById('display-desc').innerText = data.description;
            }
        }
    });

    // 2. LISTEN TO HOME CONTENT (website/data)
    onSnapshot(doc(db, "website", "data"), (d) => {
        if(d.exists()) {
            const data = d.data();
            // These IDs must exist in your HTML
            if(document.getElementById('hero-title')) document.getElementById('hero-title').innerText = data.title;
            if(document.getElementById('hero-desc')) document.getElementById('hero-desc').innerText = data.description;
            if(document.getElementById('hero-img')) document.getElementById('hero-img').src = data.heroImage;
        }
    });

    // 3. LISTEN TO GALLERY (website/gallery)
    onSnapshot(doc(db, "website", "gallery"), (d) => {
        const container = document.getElementById('gallery-container');
        if(d.exists() && container) {
            container.innerHTML = d.data().images.map(url => `
                <div class="overflow-hidden rounded-xl h-64 shadow-lg"> 
                    <img src="${url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=Invalid+Link'">
                </div>
            `).join('');
        }
    });

    // 4. LISTEN TO EXECUTIVES (executives)
    onSnapshot(collection(db, "executives"), (snap) => {
        const list = document.getElementById('member-list');
        if(list) {
            list.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="text-center p-4 glass rounded-3xl">
                        <img src="${m.url}" class="w-20 h-20 rounded-full mx-auto mb-2 object-cover border-2 border-cyan-500">
                        <h3 class="font-bold">${m.name}</h3>
                        <p class="text-xs text-cyan-400 uppercase">${m.pos}</p>
                    </div>
                `;
            });
        }
    });

    // 5. LISTEN TO CONTACTS (website/contact)
    onSnapshot(doc(db, "website", "contact"), (d) => {
        if(d.exists()) {
            const c = d.data();
            // These IDs must exist in your Footer
            if(document.getElementById('phone-link')) document.getElementById('phone-link').href = "tel:" + c.phone;
            if(document.getElementById('fb-link')) document.getElementById('fb-link').href = c.facebook;
            if(document.getElementById('ig-link')) document.getElementById('ig-link').href = c.instagram;
            if(document.getElementById('yt-link')) document.getElementById('yt-link').href = c.youtube;
        }
    });

    // --- START QUIZ LISTENER ---
const startBtn = document.getElementById('start-quiz-btn');
if (startBtn) {
    startBtn.addEventListener('click', () => {
        // This sends the user to your quiz page
        window.location.href = 'quiz.html';
    });
}
</script>
</script>
    
</body>
</html>
