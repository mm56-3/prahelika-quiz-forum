<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Your original radial gradient background */
        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #020617 80%); 
            color: white; 
            min-height: 100vh; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.3s ease; /* Added smooth transition */
        }
        /* Forces Title to stay Capital and look clean */
        #hero-title {
            text-transform: uppercase;
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-xl font-black text-cyan-400">PRAHELIKA</span>
        </div>
        <div class="hidden md:flex gap-6 text-xs font-bold uppercase">
            <a href="#home">Home</a>
            <a href="#gallery">Gallery</a>
            <a href="#executives">Executives</a>
            <a href="#leaderboard">Leaderboard</a>
        </div>
        <button id="quiz-trigger" class="bg-cyan-500 text-blue-950 px-5 py-2 rounded-full font-bold hover:scale-105 transition">START QUIZ</button>
    </nav>

    <section id="home" class="pt-40 pb-20 px-6 text-center">
        <h1 id="hero-title" class="text-5xl md:text-7xl font-black mb-6 animate__animated animate__fadeIn">PRAHELIKA QUIZ FORUM DARRANG</h1>
        <p id="hero-desc" class="text-gray-400 max-w-2xl mx-auto mb-10">Unleash your intellect with Prahelika.</p>
        <img id="special-team-img" src="" class="w-full max-w-4xl mx-auto rounded-3xl shadow-2xl border border-white/10">
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-3xl font-bold text-center mb-10 uppercase tracking-widest">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-8">
            </div>
    </section>

    <footer id="contact" class="p-10 text-center glass mt-20">
        <p id="contact-info">Contact: prahelika@darrang.com</p>
    </footer>

    <script type="module">
        // 1. FIXED IMPORTS (Uses CDN so Vercel doesn't crash)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 2. YOUR FIREBASE CONFIG (Add your actual keys here)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 3. BUTTON HANDLER ---
        document.getElementById('quiz-trigger').onclick = () => {
            alert("Quiz initializing...");
        };

        // --- 4. THE LISTENERS (Updated to match your admin field names) ---

        // Listen for Homepage Content
        onSnapshot(doc(db, "site_content", "homepage"), (snapshot) => {
            const data = snapshot.data();
            if (data) {
                // We use .toUpperCase() here to force Capitals even if you type lowercase in admin
                if(data.title) document.getElementById('hero-title').innerText = data.title.toUpperCase();
                if(data.desc) document.getElementById('hero-desc').innerText = data.desc;
                if(data.heroImg) document.getElementById('special-team-img').src = data.heroImg;
            }
        });

        // Listen for Executive Member Updates
        onSnapshot(collection(db, "executives"), (querySnapshot) => {
            const list = document.getElementById('exec-list');
            list.innerHTML = ''; 
            querySnapshot.forEach((doc) => {
                const member = doc.data();
                list.innerHTML += `
                    <div class="glass p-6 rounded-2xl text-center w-64 animate__animated animate__fadeInUp">
                        <img src="${member.url || ''}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-cyan-400 object-cover">
                        <h3 class="font-bold text-lg uppercase">${member.name}</h3>
                        <p class="text-cyan-400 text-sm font-bold">${member.pos}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
