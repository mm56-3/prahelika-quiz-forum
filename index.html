<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #020617 80%); 
            color: white; 
            min-height: 100vh; 
        }

        /* RESTORING SMOOTH TRANSITIONS */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* FORCING CAPITAL TITLES */
        #hero-title {
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" id="nav-logo" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40?text=P'">
            <span class="text-xl font-black text-cyan-400">PRAHELIKA</span>
        </div>
        <div class="hidden md:flex gap-6 text-xs font-bold uppercase">
            <a href="#home">Home</a>
            <a href="#gallery">Gallery</a>
            <a href="#executives">Executives</a>
            <a href="#leaderboard">Leaderboard</a>
        </div>
        <button id="quiz-trigger" class="bg-cyan-500 text-blue-950 px-5 py-2 rounded-full font-bold hover:bg-cyan-400 transition-all">START QUIZ</button>
    </nav>

    <section id="home" class="pt-40 pb-20 px-6 text-center">
        <h1 id="hero-title" class="text-5xl md:text-7xl font-black mb-6 animate__animated animate__fadeInDown">
            PRAHELIKA QUIZ FORUM DARRANG
        </h1>
        <p id="hero-desc" class="text-gray-400 max-w-2xl mx-auto mb-10">Unleash your intellect with Prahelika.</p>
        <img id="special-team-img" src="" class="w-full max-w-4xl mx-auto rounded-3xl shadow-2xl border border-white/10 animate__animated animate__zoomIn">
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-3xl font-bold text-center mb-10 uppercase tracking-widest">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-8"></div>
    </section>

    <script type="module">
        // FIXED CDN IMPORTS (Vercel-Safe)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ADD YOUR REAL CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- BUTTON FIX (Direct Binding) ---
        // This is the only way to make buttons work inside a 'module' script
        const quizButton = document.getElementById('quiz-trigger');
        if (quizButton) {
            quizButton.onclick = () => {
                alert("Quiz starting... Checking database connection!");
            };
        }

        // --- MASTER LISTENERS ---
        onSnapshot(doc(db, "site_content", "homepage"), (snapshot) => {
            const data = snapshot.data();
            if (data) {
                // RESTORED CAPITAL TRANSITION
                if(data.title) document.getElementById('hero-title').innerText = data.title.toUpperCase();
                if(data.desc) document.getElementById('hero-desc').innerText = data.desc;
                if(data.heroImg) document.getElementById('special-team-img').src = data.heroImg;
            }
        });

        onSnapshot(collection(db, "executives"), (querySnapshot) => {
            const list = document.getElementById('exec-list');
            list.innerHTML = ''; 
            querySnapshot.forEach((doc) => {
                const member = doc.data();
                list.innerHTML += `
                    <div class="glass p-6 rounded-2xl text-center w-64 animate__animated animate__fadeInUp">
                        <img src="${member.url}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-cyan-400 object-cover">
                        <h3 class="font-bold text-lg uppercase">${member.name}</h3>
                        <p class="text-cyan-400 text-sm">${member.pos}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
