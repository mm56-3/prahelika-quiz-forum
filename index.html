<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM DARRANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* 1. RESTORING THE ANIMATED GRADIENT */
        body { 
            background: linear-gradient(-45deg, #0d122b, #1e3a8a, #1e40af, #0891b2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. SMOOTH TRANSITIONS & GLASS EFFECT */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 3. FORCING CAPITAL TITLES */
        .uppercase-title {
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <span class="text-xl font-black text-cyan-400 tracking-tighter uppercase">Prahelika</span>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="#home" class="hover:text-cyan-400 transition">Home</a>
            <a href="#gallery" class="hover:text-cyan-400 transition">Gallery</a>
            <a href="#executives" class="hover:text-cyan-400 transition">Executives</a>
            <a href="#leaderboard" class="hover:text-cyan-400 transition">Leaderboard</a>
        </div>
        <button id="quiz-trigger" class="bg-cyan-500 text-blue-950 px-6 py-2 rounded-full font-black text-xs uppercase hover:scale-105 transition-transform active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.5)]">
            Start Quiz
        </button>
    </nav>

    <section id="home" class="pt-52 pb-20 px-6 text-center">
        <h1 id="hero-title" class="text-5xl md:text-8xl font-black mb-6 uppercase-title animate__animated animate__fadeInDown">
            PRAHELIKA QUIZ FORUM DARRANG
        </h1>
        <p id="hero-desc" class="text-cyan-100/60 max-w-2xl mx-auto mb-10 text-lg md:text-xl font-light animate__animated animate__fadeIn animate__delay-1s">
            Unleash your intellect with Darrang's premier thinkers.
        </p>
        <div class="relative inline-block animate__animated animate__zoomIn animate__delay-1s">
            <img id="special-team-img" src="" class="w-full max-w-5xl mx-auto rounded-3xl shadow-2xl border border-white/10">
            <div class="absolute inset-0 rounded-3xl bg-gradient-to-t from-[#0d122b] via-transparent to-transparent opacity-60"></div>
        </div>
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-3xl font-black text-center mb-16 uppercase tracking-[0.3em] text-cyan-400">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-10 max-w-6xl mx-auto">
            </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI LISTENERS
        onSnapshot(doc(db, "site_content", "homepage"), (snap) => {
            const data = snap.data();
            if (data) {
                if(data.title) document.getElementById('hero-title').innerText = data.title;
                if(data.desc) document.getElementById('hero-desc').innerText = data.desc;
                if(data.heroImg) document.getElementById('special-team-img').src = data.heroImg;
            }
        });

        onSnapshot(collection(db, "executives"), (snap) => {
            const list = document.getElementById('exec-list');
            list.innerHTML = ''; 
            snap.forEach((doc) => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="glass p-8 rounded-[2rem] text-center w-72 animate__animated animate__fadeInUp">
                        <img src="${m.url}" class="w-24 h-24 rounded-full mx-auto mb-6 border-2 border-cyan-400/50 p-1 object-cover">
                        <h3 class="font-bold text-xl uppercase tracking-wider">${m.name}</h3>
                        <p class="text-cyan-400 text-xs font-bold uppercase mt-2">${m.pos}</p>
                    </div>`;
            });
        });

        document.getElementById('quiz-trigger').onclick = () => alert("Quiz System Initializing...");
    </script>
</body>
</html>
