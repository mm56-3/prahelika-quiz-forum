<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prahelika Quiz Forum Darrang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Your favorite Blue Gradient Theme */
        body { 
            background: #0d122b; 
            background: linear-gradient(-45deg, #0d122b, #1e3a8a, #1e40af, #0891b2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-black/20 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <span class="text-xl font-bold tracking-widest text-cyan-400">PRAHELIKA</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-white/80">
            <a href="#home" class="hover:text-white transition">Home</a>
            <a href="#gallery" class="hover:text-white transition">Gallery</a>
            <a href="#executives" class="hover:text-white transition">Executives</a>
            <a href="#leaderboard" class="hover:text-white transition">Leaderboard</a>
        </div>
        <button id="quiz-trigger" class="bg-cyan-500 text-blue-900 px-6 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition">START QUIZ</button>
    </nav>

    <section id="home" class="pt-48 pb-20 px-6 text-center">
        <h1 id="hero-title" class="text-6xl md:text-8xl font-black mb-6 animate__animated animate__fadeInDown">
            Prahelika Quiz Forum Darrang
        </h1>
        <p id="hero-desc" class="text-gray-300 max-w-2xl mx-auto mb-10 text-lg opacity-90">
            Loading your description from the Admin panel...
        </p>
        <div id="hero-img-container" class="max-w-5xl mx-auto">
             <img id="special-team-img" src="https://via.placeholder.com/1200x600/1e3a8a/ffffff?text=Prahelika+Darrang" class="w-full rounded-3xl shadow-2xl border border-white/10">
        </div>
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-4xl font-bold text-center mb-12 uppercase tracking-tighter">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-8 max-w-7xl mx-auto">
            </div>
    </section>

    <script type="module">
        // Using Fixed CDN Links so Vercel can resolve the modules
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // IMPORTANT: Paste your exact Firebase Config here
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- THE MASTER LISTENER ---
        // This watches the "homepage" document for changes you make in Admin
        onSnapshot(doc(db, "site_content", "homepage"), (snap) => {
            const data = snap.data();
            if (data) {
                if(data.title) document.getElementById('hero-title').innerText = data.title;
                if(data.desc) document.getElementById('hero-desc').innerText = data.desc;
            }
        });

        // --- EXECUTIVES LISTENER ---
        onSnapshot(collection(db, "executives"), (snap) => {
            const list = document.getElementById('exec-list');
            list.innerHTML = ''; 
            snap.forEach((doc) => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="glass-card p-8 rounded-3xl text-center w-72 animate__animated animate__fadeInUp">
                        <img src="${d.url || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-full mx-auto mb-4 border-2 border-cyan-400 object-cover">
                        <h3 class="text-xl font-bold">${d.name}</h3>
                        <p class="text-cyan-400 font-medium">${d.pos}</p>
                    </div>`;
            });
        });

        // START BUTTON FIX
        document.getElementById('quiz-trigger').onclick = () => {
            alert("Quiz feature connected to database. Get ready!");
        };
    </script>
</body>
</html>
