```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Prahelika Quiz Forum</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.logo{
width:60px;
height:60px;
border-radius:50%;
}

h1{
margin:0;
}

/* NAVIGATION */

nav a{

text-decoration:none;
margin:10px;
padding:12px 22px;
border-radius:25px;
font-weight:bold;

background:linear-gradient(45deg,#ff6a00,#ee0979);

color:white;

transition:0.4s;
}

nav a:hover{

transform:scale(1.1);

background:linear-gradient(45deg,#00c6ff,#0072ff);

box-shadow:0 0 15px cyan;

}

/* HERO */

.hero{

text-align:center;
padding:80px 20px;

}

.hero h2{

font-size:40px;

background:linear-gradient(45deg,#ffdd00,#ff512f);

-webkit-background-clip:text;

color:transparent;

}

.hero button{

margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;

background:linear-gradient(45deg,#00ff87,#60efff);

transition:0.3s;

}

.hero button:hover{

transform:scale(1.15);
box-shadow:0 0 20px cyan;

}

/* QUIZ AREA */

.quiz{

display:none;
text-align:center;
padding:40px;

}

.question{

font-size:24px;
margin-bottom:20px;

}

.option{

display:block;

margin:10px auto;

padding:10px;

width:200px;

border:none;

border-radius:20px;

cursor:pointer;

background:linear-gradient(45deg,#ff9966,#ff5e62);

color:white;

}

.option:hover{

transform:scale(1.1);

}

/* TIMER */

.timer{

font-size:25px;

color:yellow;

}

/* LEADERBOARD */

.leaderboard{

display:none;

padding:40px;

text-align:center;

}

table{

margin:auto;

background:white;

color:black;

border-radius:10px;

padding:20px;

}

td,th{

padding:10px 20px;

}

</style>

</head>

<body>

<header>

<div style="display:flex;align-items:center;gap:15px">

<img src="logo.png" class="logo">

<h1>Prahelika Quiz Forum</h1>

</div>

<nav>

<a href="#">Home</a>

<a href="#" onclick="startQuiz()">Start Quiz</a>

<a href="#" onclick="showLeaderboard()">Leaderboard</a>

<a href="#">Gallery</a>

<a href="#">Members</a>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<h2>Northeast India's Exciting Quiz Platform</h2>

<p>Test your knowledge and compete with the brightest minds</p>

<button onclick="startQuiz()">Start Daily Quiz</button>

</section>

<!-- QUIZ -->

<section class="quiz" id="quiz">

<div class="timer">Time Left: <span id="time">10</span>s</div>

<div class="question" id="question"></div>

<div id="options"></div>

</section>

<!-- LEADERBOARD -->

<section class="leaderboard" id="leaderboard">

<h2>Leaderboard</h2>

<table id="board">

<tr>

<th>Name</th>

<th>Score</th>

</tr>

</table>

</section>

<script>

const quizData=[

{

q:"Who discovered the Raman Effect?",

o:["C.V Raman","Newton","Einstein","Tesla"],

a:0

},

{

q:"What is the SI unit of Resistance?",

o:["Volt","Ohm","Ampere","Watt"],

a:1

},

{

q:"Which planet is called Red Planet?",

o:["Earth","Mars","Venus","Saturn"],

a:1

}

];

let index=0;

let score=0;

let timer;

let timeLeft=10;

function startQuiz(){

document.querySelector(".hero").style.display="none";

document.getElementById("leaderboard").style.display="none";

document.getElementById("quiz").style.display="block";

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=10;

document.getElementById("time").innerText=timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("time").innerText=timeLeft;

if(timeLeft==0){

nextQuestion();

}

},1000);

const q=quizData[index];

document.getElementById("question").innerText=q.q;

const optDiv=document.getElementById("options");

optDiv.innerHTML="";

q.o.forEach((opt,i)=>{

let btn=document.createElement("button");

btn.innerText=opt;

btn.className="option";

btn.onclick=()=>checkAnswer(i);

optDiv.appendChild(btn);

});

}

function checkAnswer(i){

if(i==quizData[index].a){

score++;

}

nextQuestion();

}

function nextQuestion(){

index++;

if(index<quizData.length){

loadQuestion();

}else{

finishQuiz();

}

}

function finishQuiz(){

clearInterval(timer);

let name=prompt("Enter your name");

let board=JSON.parse(localStorage.getItem("leaderboard"))||[];

board.push({name:name,score:score});

localStorage.setItem("leaderboard",JSON.stringify(board));

showLeaderboard();

}

function showLeaderboard(){

document.getElementById("quiz").style.display="none";

document.querySelector(".hero").style.display="none";

document.getElementById("leaderboard").style.display="block";

const board=JSON.parse(localStorage.getItem("leaderboard"))||[];

const table=document.getElementById("board");

table.innerHTML="<tr><th>Name</th><th>Score</th></tr>";

board.sort((a,b)=>b.score-a.score);

board.forEach(p=>{

let row=table.insertRow();

row.insertCell(0).innerText=p.name;

row.insertCell(1).innerText=p.score;

});

}

</script>

</body>

</html>
```
