<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prahelika Quiz Forum | Darrang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Your favorite Blue Gradient & Glass Design */
        body { 
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #1e40af, #0891b2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: white;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: 200%; animation: marquee 25s linear infinite; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-black/20 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" id="nav-logo" class="w-10 h-10 animate-pulse">
            <span class="text-xl font-black tracking-widest text-cyan-400">PRAHELIKA</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest">
            <a href="#home" class="hover:text-cyan-400 transition">Home</a>
            <a href="#gallery" class="hover:text-cyan-400 transition">Gallery</a>
            <a href="#executives" class="hover:text-cyan-400 transition">Executives</a>
            <a href="#leaderboard" class="hover:text-cyan-400 transition">Leaderboard</a>
            <a href="#contact" class="hover:text-cyan-400 transition">Contact</a>
        </div>
        <button id="start-quiz-btn" class="bg-cyan-500 text-blue-900 px-6 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition">START QUIZ</button>
    </nav>

    <section id="home" class="pt-40 pb-20 px-6 text-center">
        <h1 id="hero-title" class="text-5xl md:text-8xl font-black mb-6 animate__animated animate__zoomIn">Loading...</h1>
        <p id="hero-desc" class="text-gray-200 max-w-2xl mx-auto mb-10 opacity-80">Loading description...</p>
        <img id="special-team-img" src="placeholder.jpg" class="w-full max-w-5xl mx-auto rounded-3xl shadow-2xl border-4 border-white/10 hover:scale-[1.01] transition duration-700">
    </section>

    <section id="gallery" class="py-20 bg-black/10">
        <h2 class="text-3xl font-bold text-center mb-10 uppercase tracking-widest">Gallery</h2>
        <div class="overflow-hidden relative group">
            <div id="gallery-container" class="animate-marquee gap-6">
                </div>
        </div>
    </section>

    <section id="executives" class="py-20 px-6">
        <h2 class="text-4xl font-bold text-center mb-12">Executive Members</h2>
        <div id="exec-list" class="flex flex-wrap justify-center gap-8 max-w-7xl mx-auto">
            </div>
    </section>

    <footer id="contact" class="py-20 px-6 glass-card mt-20">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-4">Contact Prahelika Forum</h2>
            <p id="contact-text" class="text-cyan-300 text-lg mb-4">Loading contact...</p>
        </div>
    </footer>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. BUTTON FIX (Attaching functions to Window)
        window.startQuiz = () => {
            alert("Quiz feature is loading from database...");
            // Redirect to quiz page or open modal here
        };
        document.getElementById('start-quiz-btn').onclick = window.startQuiz;

        // 2. HERO LISTENER (Titles, Description, Main Image)
        onSnapshot(doc(db, "site_content", "homepage"), (snap) => {
            const data = snap.data();
            if (data) {
                document.getElementById('hero-title').innerText = data.title || "Prahelika Forum";
                document.getElementById('hero-desc').innerText = data.description || "";
                if(data.heroImg) document.getElementById('special-team-img').src = data.heroImg;
            }
        });

        // 3. EXECUTIVES LISTENER
        onSnapshot(collection(db, "executives"), (snap) => {
            const list = document.getElementById('exec-list');
            list.innerHTML = '';
            snap.forEach((doc) => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="glass-card p-8 rounded-3xl text-center w-72 animate__animated animate__fadeInUp">
                        <img src="${d.url}" class="w-28 h-28 rounded-full mx-auto mb-4 border-4 border-cyan-400 object-cover">
                        <h3 class="text-xl font-bold">${d.name}</h3>
                        <p class="text-cyan-300 font-semibold mb-2">${d.pos}</p>
                        <p class="text-xs opacity-70">${d.desc || ''}</p>
                    </div>`;
            });
        });

        // 4. GALLERY LISTENER
        onSnapshot(collection(db, "gallery"), (snap) => {
            const cont = document.getElementById('gallery-container');
            cont.innerHTML = '';
            snap.forEach((doc) => {
                const img = doc.data();
                cont.innerHTML += `<img src="${img.url}" class="h-64 rounded-2xl border border-white/20 shadow-xl">`;
            });
        });

        // 5. CONTACT LISTENER
        onSnapshot(doc(db, "site_content", "contact"), (snap) => {
            const data = snap.data();
            if(data) document.getElementById('contact-text').innerText = data.info;
        });

    </script>
</body>
</html>
