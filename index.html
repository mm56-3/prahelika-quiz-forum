<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <section class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 id="hero-title" class="text-6xl md:text-8xl font-black mb-4 uppercase tracking-tighter">PRAHELIKA</h1>
        <p id="hero-desc" class="text-gray-400 max-w-xl mb-10 text-lg">Official Quiz Forum</p>
        <div class="w-full max-w-5xl h-[400px] glass rounded-[2rem] overflow-hidden">
            <img id="hero-img" src="" class="w-full h-full object-cover opacity-80">
        </div>
    </section>

    <div class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold mb-10 border-l-4 border-purple-500 pl-4">GALLERY</h2>
        <div id="gallery-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <div class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold mb-10 border-l-4 border-green-500 pl-4">MEMBERS</h2>
        <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // OBSERVE HOME
        onSnapshot(doc(db, "website", "data"), (d) => {
            if(d.exists()) {
                document.getElementById('hero-title').innerText = d.data().title;
                document.getElementById('hero-desc').innerText = d.data().description;
                document.getElementById('hero-img').src = d.data().heroImage;
            }
        });

        // OBSERVE GALLERY
        onSnapshot(doc(db, "website", "gallery"), (d) => {
            if(d.exists()) {
                document.getElementById('gallery-container').innerHTML = d.data().images.map(url => `
                    <div class="glass h-64 rounded-2xl overflow-hidden">
                        <img src="${url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=Invalid+Link'">
                    </div>
                `).join('');
            }
        });

        // OBSERVE MEMBERS
        onSnapshot(collection(db, "executives"), (snap) => {
            const list = document.getElementById('member-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="glass p-6 rounded-3xl text-center">
                        <img src="${m.url}" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-cyan-500 object-cover">
                        <h3 class="font-bold">${m.name}</h3>
                        <p class="text-cyan-400 text-xs">${m.pos}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
