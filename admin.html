<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input,textarea{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:orange;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Prahelika Admin Panel</h1>

<h3>Admin Login</h3>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<div id="dashboard" style="display:none">

<h2>Add Quiz Question</h2>

<input id="question" placeholder="Question">
<input id="a" placeholder="Option A">
<input id="b" placeholder="Option B">
<input id="c" placeholder="Option C">
<input id="d" placeholder="Option D">
<input id="ans" placeholder="Correct Answer">

<button onclick="addQuestion()">Add Question</button>

<hr>

<h2>Add Gallery Image</h2>

<input id="galleryUrl" placeholder="Image URL">

<button onclick="addGallery()">Add</button>

<hr>

<h2>Add Executive Member</h2>

<input id="mname" placeholder="Name">
<input id="mphoto" placeholder="Photo URL">
<input id="mrole" placeholder="Role">

<button onclick="addMember()">Add Member</button>

</div>

<script src="app.js"></script>

</body>

</html>
