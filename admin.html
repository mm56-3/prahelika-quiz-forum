<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM - ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea { background: #000 !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="max-w-md mx-auto mt-20 p-8 card rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400 text-center uppercase tracking-widest">Admin Login</h1>
        <input type="text" id="user" placeholder="Admin ID" class="w-full p-3 mb-4 rounded-lg outline-none focus:border-cyan-500">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 mb-6 rounded-lg outline-none focus:border-cyan-500">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition">ENTER DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h1 class="text-3xl font-black text-cyan-400 uppercase">Master Control Panel</h1>
            <button onclick="location.reload()" class="bg-red-900/40 text-red-400 px-4 py-1 rounded-full text-xs border border-red-900/50">Logout</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-cyan-400 border-l-4 border-cyan-400 pl-3">Main Content</h2>
                
                <label class="text-xs text-gray-500 uppercase font-bold">Forum Title</label>
                <input type="text" id="title-input" placeholder="Prahelika Quiz Forum" class="w-full p-2 mb-4 rounded">
                
                <label class="text-xs text-gray-500 uppercase font-bold">Homepage Description</label>
                <textarea id="desc-input" placeholder="Describe the forum..." class="w-full p-2 mb-4 rounded h-24"></textarea>
                
                <label class="text-xs text-gray-500 uppercase font-bold">Hero Image URL</label>
                <input type="text" id="img-input" placeholder="Paste Image Link" class="w-full p-2 mb-4 rounded">
                
                <button id="save-main-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 p-3 rounded-lg font-bold">UPDATE LIVE WEBSITE</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-green-400 border-l-4 border-green-400 pl-3">Add Executive Member</h2>
                <input type="text" id="exec-name" placeholder="Full Name" class="w-full p-2 mb-2 rounded">
                <input type="text" id="exec-pos" placeholder="Position (e.g. President)" class="w-full p-2 mb-2 rounded">
                <input type="text" id="exec-url" placeholder="Member Photo URL" class="w-full p-2 mb-4 rounded">
                <button id="add-exec-btn" class="w-full bg-green-600 hover:bg-green-500 p-3 rounded-lg font-bold">ADD MEMBER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your specific Firebase credentials
        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN SYSTEM
        document.getElementById('login-btn').onclick = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Admin Credentials
            if(u === 'VIKRAM784125' && p === '#UDSB784125781005') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                alert("Wrong ID or Password");
            }
        };

        // SAVE MAIN CONTENT TO FIREBASE
        document.getElementById('save-main-btn').onclick = async () => {
            const title = document.getElementById('title-input').value;
            const desc = document.getElementById('desc-input').value;
            const heroImg = document.getElementById('img-input').value;

            try {
                // This targets the document "data" inside collection "website"
                await setDoc(doc(db, "website", "data"), {
                    title: title,
                    description: desc,
                    heroImage: heroImg
                }, { merge: true });
                alert("Success! The live website has been updated.");
            } catch (e) { 
                alert("Error: " + e.message); 
            }
        };

        // ADD NEW MEMBER TO FIREBASE
        document.getElementById('add-exec-btn').onclick = async () => {
            const name = document.getElementById('exec-name').value;
            const pos = document.getElementById('exec-pos').value;
            const url = document.getElementById('exec-url').value;

            try {
                await addDoc(collection(db, "executives"), { name, pos, url });
                alert("New Member Added Successfully!");
                // Clear the boxes after success
                document.getElementById('exec-name').value = "";
                document.getElementById('exec-pos').value = "";
                document.getElementById('exec-url').value = "";
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
