<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
}

input, textarea{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#0072ff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Prahelika Admin Panel</h1>

<input id="adminUser" placeholder="Username">
<input id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="dashboard" style="display:none">

<h2>Upload Logo</h2>

<input type="file" id="logoUpload">
<button onclick="uploadLogo()">Upload Logo</button>

<hr>

<h2>Homepage Description</h2>

<textarea id="homeText"></textarea>

<br>

<button onclick="updateHome()">Update Description</button>

<hr>

<h2>Add Quiz Question</h2>

<input id="q" placeholder="Question"><br>

<input id="a" placeholder="Option A">
<input id="b" placeholder="Option B">
<input id="c" placeholder="Option C">
<input id="d" placeholder="Option D">

<br>

<input id="ans" placeholder="Correct Option (a/b/c/d)">

<br><br>

<button onclick="addQuestion()">Add Question</button>

<hr>

<h2>Upload Gallery Image</h2>

<input type="file" id="galleryUpload">

<button onclick="uploadGallery()">Upload</button>

<hr>

<h2>Upload Achievement Image</h2>

<input type="file" id="achUpload">

<button onclick="uploadAchievement()">Upload</button>

<hr>

<h2>Add Executive Member</h2>

<input id="mname" placeholder="Name">
<input id="mrole" placeholder="Position">

<input type="file" id="memberPhoto">

<button onclick="addMember()">Add Member</button>

</div>

<script src="app.js"></script>

</body>
</html>
