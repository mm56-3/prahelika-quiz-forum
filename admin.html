<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prahelika Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

    <div id="login-form" class="max-w-md mx-auto mt-20 p-8 bg-gray-800 rounded-3xl border border-white/10 shadow-2xl text-center">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400">Secure CMS Login</h1>
        <input type="text" id="admin-user" placeholder="Admin ID" class="w-full p-3 mb-4 bg-black rounded border border-gray-700 outline-none">
        <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 mb-6 bg-black rounded border border-gray-700 outline-none">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">ACCESS DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto py-10">
        <h1 class="text-3xl font-black mb-10 text-cyan-400">PRAHELIKA MASTER CONTROL</h1>
        
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-2">Website Identity</h2>
                <input type="text" id="site-title" value="Prahelika Quiz Forum Darrang" class="w-full p-2 mb-4 bg-black border border-gray-700 rounded">
                <textarea id="site-desc" placeholder="Homepage Description" class="w-full p-2 mb-4 bg-black border border-gray-700 rounded h-24"></textarea>
                <button id="update-site-btn" class="w-full bg-cyan-600 py-3 rounded font-bold">Update Live Website</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-green-400 pl-2">Add Question</h2>
                <input type="text" id="q-text" placeholder="Question" class="w-full p-2 mb-2 bg-black border border-gray-700 rounded">
                <input type="text" id="ans" placeholder="Correct Answer" class="w-full p-2 mb-4 bg-slate-700 border border-gray-600 rounded">
                <button id="add-q-btn" class="w-full bg-green-600 py-3 rounded font-bold">Push to Quiz</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // FIX: Directly attaching clicks to the button IDs
        document.getElementById('login-btn').onclick = () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if(u === 'VIKRAM784125' && p === '#UDSB784125781005') {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else { alert('Access Denied'); }
        };

        // Push Updates to Website
        document.getElementById('update-site-btn').onclick = async () => {
            const title = document.getElementById('site-title').value;
            const desc = document.getElementById('site-desc').value;
            await setDoc(doc(db, "site_content", "homepage"), { title, desc }, { merge: true });
            alert("Website Updated!");
        };

        // Push Questions to Quiz
        document.getElementById('add-q-btn').onclick = async () => {
            const text = document.getElementById('q-text').value;
            const correct = document.getElementById('ans').value;
            await addDoc(collection(db, "questions"), { text, correct });
            alert("Question Added!");
        };
    </script>
</body>
</html>
