<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea { background: #000 !important; border: 1px solid #334155 !important; color: white !important; }
    </style>

<body class="p-6">

    <div id="login-box" class="max-w-md mx-auto mt-20 p-8 card rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400 text-center uppercase tracking-widest">Admin Login</h1>
        <input type="text" id="user" placeholder="Admin ID" class="w-full p-3 mb-4 rounded-lg outline-none focus:border-cyan-500">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 mb-6 rounded-lg outline-none focus:border-cyan-500">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition">ENTER DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h1 class="text-3xl font-black text-cyan-400 uppercase">Master Control Panel</h1>
            <button onclick="location.reload()" class="bg-red-900/40 text-red-400 px-4 py-1 rounded-full text-xs border border-red-900/50">Logout</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-cyan-400 border-l-4 border-cyan-400 pl-3">Website Header</h2>
                <input type="text" id="title-input" placeholder="New Forum Title" class="w-full p-2 mb-4 rounded">
                <textarea id="desc-input" placeholder="New Description" class="w-full p-2 mb-4 rounded h-20"></textarea>
                <input type="text" id="img-input" placeholder="New Hero Image URL" class="w-full p-2 mb-4 rounded">
                <button id="save-main-btn" class="w-full bg-cyan-600 p-3 rounded-lg font-bold">UPDATE LIVE SITE</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-green-400 border-l-4 border-green-400 pl-3">Add Executive</h2>
                <input type="text" id="exec-name" placeholder="Name" class="w-full p-2 mb-2 rounded">
                <input type="text" id="exec-pos" placeholder="Position" class="w-full p-2 mb-2 rounded">
                <input type="text" id="exec-url" placeholder="Photo URL" class="w-full p-2 mb-4 rounded">
                <button id="add-exec-btn" class="w-full bg-green-600 p-3 rounded-lg font-bold">ADD MEMBER</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-purple-400 border-l-4 border-purple-400 pl-3">Gallery</h2>
                <textarea id="gallery-urls" placeholder="Paste URLs separated by commas" class="w-full p-2 mb-4 rounded h-32"></textarea>
                <button id="upload-gallery-btn" class="w-full bg-purple-600 p-3 rounded-lg font-bold">UPDATE GALLERY</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-yellow-400 border-l-4 border-yellow-400 pl-3">Add Quiz Question</h2>
                <input type="text" id="quiz-ques" placeholder="Question" class="w-full p-2 mb-2 rounded">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="text" id="opt-a" placeholder="A" class="p-2 rounded">
                    <input type="text" id="opt-b" placeholder="B" class="p-2 rounded">
                    <input type="text" id="opt-c" placeholder="C" class="p-2 rounded">
                    <input type="text" id="opt-d" placeholder="D" class="p-2 rounded">
                </div>
                <input type="text" id="quiz-correct" placeholder="Correct Answer" class="w-full p-2 mb-4 rounded">
                <button id="add-quiz-btn" class="w-full bg-yellow-600 p-3 rounded-lg font-bold text-black">ADD QUESTION</button>
            </div>
        </div>
    </div>
