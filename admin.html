<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prahelika Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0f172a; color: white; }</style>
</head>
<body class="p-4 md:p-10">
    <div id="lock" class="max-w-md mx-auto mt-20 text-center">
        <h1 class="text-3xl font-bold mb-6">Prahelika Admin</h1>
        <input type="text" id="user" placeholder="Username" class="w-full p-3 mb-4 bg-gray-800 rounded">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 mb-6 bg-gray-800 rounded">
        <button onclick="login()" class="w-full bg-cyan-600 py-3 rounded font-bold">UNLOCK DASHBOARD</button>
    </div>

    <div id="controls" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-4xl font-black text-cyan-400">MASTER DASHBOARD</h1>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-1 rounded text-sm">Logout</button>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-2">Homepage & Hero</h3>
                <label class="text-xs text-gray-400">Main Title</label>
                <input type="text" id="h-title" class="w-full p-2 bg-black mb-3 rounded">
                <label class="text-xs text-gray-400">Hero Description</label>
                <textarea id="h-desc" class="w-full p-2 bg-black mb-4 rounded h-20"></textarea>
                <button onclick="updateHero()" class="w-full bg-blue-600 py-2 rounded">Update Hero Section</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-xl font-bold mb-4 border-l-4 border-green-400 pl-2">Executive Members</h3>
                <input type="text" id="ex-name" placeholder="Full Name" class="w-full p-2 bg-black mb-2 rounded">
                <input type="text" id="ex-pos" placeholder="Position (e.g. President)" class="w-full p-2 bg-black mb-2 rounded">
                <input type="file" id="ex-img" class="text-xs mb-4">
                <button onclick="addExecutive()" class="w-full bg-green-600 py-2 rounded">Add Member</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-xl font-bold mb-4 border-l-4 border-yellow-400 pl-2">Quiz Builder</h3>
                <input type="text" id="q-txt" placeholder="Question" class="w-full p-2 bg-black mb-2 rounded">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="o1" placeholder="Opt 1" class="p-2 bg-black rounded">
                    <input type="text" id="o2" placeholder="Opt 2" class="p-2 bg-black rounded">
                    <input type="text" id="o3" placeholder="Opt 3" class="p-2 bg-black rounded">
                    <input type="text" id="o4" placeholder="Opt 4" class="p-2 bg-black rounded">
                </div>
                <input type="text" id="ans" placeholder="Correct Answer (Exact text)" class="w-full p-2 mt-2 bg-slate-700 rounded">
                <button onclick="addQ()" class="w-full bg-yellow-600 py-2 mt-4 rounded">Push to Quiz</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-xl font-bold mb-4 border-l-4 border-purple-400 pl-2">Image Gallery</h3>
                <input type="file" id="gal-img" class="mb-4">
                <button onclick="uploadGallery()" class="w-full bg-purple-600 py-2 rounded">Upload to Desktop Window</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, storage } from './firebase.js';
        import { collection, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Admin Auth
        window.login = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "VIKRAM784125" && p === "#UDSB784125781005") {
                document.getElementById('lock').classList.add('hidden');
                document.getElementById('controls').classList.remove('hidden');
            } else { alert("Invalid Credentials"); }
        };

        // Update Hero Text Logic
        window.updateHero = async () => {
            await setDoc(doc(db, "site_content", "homepage"), {
                title: document.getElementById('h-title').value,
                description: document.getElementById('h-desc').value
            });
            alert("Homepage updated live!");
        };

        // Upload Executive Member with Image
        window.addExecutive = async () => {
            const file = document.getElementById('ex-img').files[0];
            const name = document.getElementById('ex-name').value;
            const pos = document.getElementById('ex-pos').value;
            
            const storageRef = ref(storage, 'execs/' + file.name);
            const snap = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snap.ref);

            await addDoc(collection(db, "executives"), { name, pos, url });
            alert("New Executive Added!");
        };

        // (Add similar logic for Quiz and Gallery)
    </script>
</body>
</html>
