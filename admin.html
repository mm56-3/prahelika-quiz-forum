<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA QUIZ FORUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <h1 class="font-black text-2xl text-cyan-400">PRAHELIKA</h1>
        <div class="hidden md:flex space-x-6 text-sm font-bold uppercase">
            <a href="#home" class="hover:text-cyan-400">Home</a>
            <a href="#gallery" class="hover:text-cyan-400">Gallery</a>
            <a href="#executives" class="hover:text-cyan-400">Executives</a>
            <a href="#contacts" class="hover:text-cyan-400">Contacts</a>
        </div>
        <button onclick="window.location.href='quiz.html'" class="bg-cyan-500 text-black px-6 py-2 rounded-full font-bold">START QUIZ</button>
    </nav>

    <section id="home" class="min-h-[60vh] flex flex-col items-center justify-center text-center p-6">
        <h1 id="hero-title" class="text-5xl md:text-7xl font-black mb-4 uppercase">Loading Title...</h1>
        <p id="hero-desc" class="text-gray-400 max-w-2xl mb-8">Loading description...</p>
        <div class="w-full max-w-4xl h-64 glass rounded-3xl overflow-hidden shadow-2xl">
            <img id="hero-img" src="" class="w-full h-full object-cover opacity-60">
        </div>
    </section>

    <section id="gallery" class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-black mb-10 border-l-4 border-purple-500 pl-4">GALLERY</h2>
        <div id="gallery-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <section id="executives" class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-black mb-10 border-l-4 border-green-500 pl-4">EXECUTIVE MEMBERS</h2>
        <div id="member-list" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            </div>
    </section>

    <footer id="contacts" class="bg-black/50 py-12 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col md:row justify-between items-center gap-6">
            <div class="flex space-x-6">
                <a id="fb-link" href="#" target="_blank" class="text-gray-400 hover:text-blue-500 font-bold">Facebook</a>
                <a id="ig-link" href="#" target="_blank" class="text-gray-400 hover:text-pink-500 font-bold">Instagram</a>
                <a id="yt-link" href="#" target="_blank" class="text-gray-400 hover:text-red-500 font-bold">YouTube</a>
                <a id="phone-link" href="#" class="text-cyan-400 font-bold">Call Us</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. SYNC HEADER (Home Page)
        onSnapshot(doc(db, "website", "data"), (d) => {
            if (d.exists()) {
                const data = d.data();
                document.getElementById('hero-title').innerText = data.title || "PRAHELIKA";
                document.getElementById('hero-desc').innerText = data.description || "";
                document.getElementById('hero-img').src = data.heroImage || "";
            }
        });

        // 2. SYNC GALLERY (Updates whenever you click "Update Gallery" in Admin)
        onSnapshot(doc(db, "website", "gallery"), (d) => {
            const container = document.getElementById('gallery-container');
            if (d.exists() && container) {
                const images = d.data().images || [];
                container.innerHTML = images.map(url => `
                    <div class="glass rounded-xl overflow-hidden h-64 shadow-lg">
                        <img src="${url}" class="w-full h-full object-cover">
                    </div>
                `).join('');
            }
        });

        // 3. SYNC MEMBERS (Updates whenever you click "Add Member" in Admin)
        onSnapshot(collection(db, "executives"), (snap) => {
            const list = document.getElementById('member-list');
            if(list) {
                list.innerHTML = "";
                snap.forEach((doc) => {
                    const m = doc.data();
                    list.innerHTML += `
                        <div class="glass p-6 rounded-2xl text-center">
                            <img src="${m.url}" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-2 border-cyan-500">
                            <h3 class="font-bold">${m.name}</h3>
                            <p class="text-cyan-400 text-xs uppercase">${m.pos}</p>
                        </div>
                    `;
                });
            }
        });

        // 4. SYNC CONTACTS (Updates whenever you click "Save Contact Info" in Admin)
        onSnapshot(doc(db, "website", "contact"), (d) => {
            if (d.exists()) {
                const c = d.data();
                if(c.phone) document.getElementById('phone-link').href = "tel:" + c.phone;
                if(c.facebook) document.getElementById('fb-link').href = c.facebook;
                if(c.instagram) document.getElementById('ig-link').href = c.instagram;
                if(c.youtube) document.getElementById('yt-link').href = c.youtube;
            }
        });
    </script>
</body>
</html>
