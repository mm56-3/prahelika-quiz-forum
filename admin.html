<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prahelika Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d122b] text-white p-6 md:p-10">

    <div id="login-form" class="max-w-md mx-auto mt-20 p-8 bg-white/5 backdrop-blur-md rounded-3xl border border-white/10 shadow-2xl text-center">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400">Admin Access</h1>
        <input type="text" id="admin-user" placeholder="Admin ID" class="w-full p-3 mb-4 bg-black rounded border border-gray-700 outline-none focus:border-cyan-500 text-white">
        <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 mb-6 bg-black rounded border border-gray-700 outline-none focus:border-cyan-500 text-white">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">ACCESS DASHBOARD</button>
    </div>

    <div id="dashboard" style="display: none;" class="max-w-5xl mx-auto py-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-cyan-400">MASTER CONTROL</h1>
            <button onclick="location.reload()" class="bg-red-900/50 px-4 py-1 rounded text-xs">Logout</button>
        </div>
        
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h2 class="text-xl font-bold mb-4 text-cyan-400">Update Website Info</h2>
                <label class="text-xs text-gray-400">Main Title</label>
                <input type="text" id="site-title" value="Prahelika Quiz Forum Darrang" class="w-full p-3 mb-4 bg-black border border-gray-800 rounded text-white">
                <label class="text-xs text-gray-400">Description</label>
                <textarea id="site-desc" class="w-full p-3 mb-4 bg-black border border-gray-800 rounded h-24 text-white">Unleash your intellect with Prahelika.</textarea>
                <button id="update-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition">PUSH UPDATES LIVE</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Using full URL imports so Vercel doesn't get confused
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // IMPORTANT: Paste your exact Firebase Config here
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN BUTTON LOGIC
        document.getElementById('login-btn').addEventListener('click', () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            
            if(u === 'VIKRAM784125' && p === '#UDSB784125781005') {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert('Invalid Credentials');
            }
        });

        // UPDATE BUTTON LOGIC
        document.getElementById('update-btn').addEventListener('click', async () => {
            const title = document.getElementById('site-title').value;
            const desc = document.getElementById('site-desc').value;

            try {
                await setDoc(doc(db, "site_content", "homepage"), {
                    title: title,
                    desc: desc
                }, { merge: true });
                alert("Website Updated Successfully!");
            } catch (e) {
                alert("Error updating! Check Firebase Rules.");
                console.error(e);
            }
        });
    </script>
</body>
</html>
