<!DOCTYPE html>
<html>
<head>
    <title>Prahelika Admin CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 md:p-10">
    <div id="login-form" class="max-w-sm mx-auto mt-20 p-8 bg-gray-800 rounded-2xl border border-white/10 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center text-cyan-400">Secure CMS Login</h1>
        <input type="text" id="u" placeholder="Admin ID" class="w-full p-3 mb-4 bg-black rounded border border-gray-700 outline-none focus:border-cyan-500">
        <input type="password" id="p" placeholder="Password" class="w-full p-3 mb-6 bg-black rounded border border-gray-700 outline-none focus:border-cyan-500">
        <button onclick="verify()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold transition">ACCESS DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl md:text-4xl font-black text-cyan-400">PRAHELIKA CONTROL PANEL</h1>
            <button onclick="location.reload()" class="text-xs bg-red-900/50 hover:bg-red-600 px-3 py-1 rounded">Logout</button>
        </div>
        
        <div class="grid md:grid-cols-2 gap-10">
            
            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 text-cyan-400 border-b border-gray-700 pb-2">Main Website Info</h2>
                <label class="text-xs text-gray-400">Website Title</label>
                <input type="text" id="site-title" value="Prahelika Quiz Forum Darrang" class="w-full p-2 mb-3 bg-black rounded border border-gray-700">
                
                <label class="text-xs text-gray-400">Homepage Description</label>
                <textarea id="site-desc" class="w-full p-2 mb-4 bg-black rounded border border-gray-700 h-24">Darrang's premier quiz platform.</textarea>
                
                <button onclick="updateWebsite()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded font-bold transition">Update Live Website</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 text-green-400 border-b border-gray-700 pb-2">Add Quiz Question</h2>
                <input type="text" id="q-txt" placeholder="Question Text" class="w-full p-2 mb-2 bg-black rounded border border-gray-700">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="opt1" placeholder="Option 1" class="p-2 bg-black rounded border border-gray-700">
                    <input type="text" id="opt2" placeholder="Option 2" class="p-2 bg-black rounded border border-gray-700">
                    <input type="text" id="opt3" placeholder="Option 3" class="p-2 bg-black rounded border border-gray-700">
                    <input type="text" id="opt4" placeholder="Option 4" class="p-2 bg-black rounded border border-gray-700">
                </div>
                <input type="text" id="ans" placeholder="Correct Answer (Exact text)" class="w-full p-2 mt-2 mb-4 bg-slate-700 rounded border border-gray-600">
                <button onclick="addQ()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded font-bold transition">Push to Quiz</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 text-purple-400 border-b border-gray-700 pb-2">Upload Gallery Image</h2>
                <input type="file" id="img-file" class="mb-4 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100">
                <button onclick="uploadImg()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-bold transition">Upload to Storage</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-white/5">
                <h2 class="text-xl font-bold mb-4 text-yellow-400 border-b border-gray-700 pb-2">Add Executive Member</h2>
                <input type="text" id="ex-name" placeholder="Member Name" class="w-full p-2 mb-2 bg-black rounded border border-gray-700">
                <input type="text" id="ex-pos" placeholder="Position (e.g. President)" class="w-full p-2 mb-4 bg-black rounded border border-gray-700">
                <button onclick="addExecutive()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-3 rounded font-bold transition">Add Member</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { db, storage } from './firebase.js';
        import { collection, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Login System
        window.verify = () => {
            if(document.getElementById('u').value === 'VIKRAM784125' && 
               document.getElementById('p').value === '#UDSB784125781005') {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert('Wrong Credentials'); }
        };

        // --- THE MASTER LISTENER TRIGGER ---
        // This function updates the "site_content" collection that your website listens to
        window.updateWebsite = async () => {
            try {
                const title = document.getElementById('site-title').value;
                const desc = document.getElementById('site-desc').value;

                await setDoc(doc(db, "site_content", "homepage"), {
                    title: title,
                    description: desc,
                    lastUpdated: new Date()
                }, { merge: true });

                alert("Website content updated successfully!");
            } catch (error) {
                console.error("Error updating website: ", error);
                alert("Update failed. Check Firebase permissions.");
            }
        };

        // Quiz Question Uploader
        window.addQ = async () => {
            const qTxt = document.getElementById('q-txt').value;
            if(!qTxt) return alert("Please enter a question");

            await addDoc(collection(db, "questions"), {
                text: qTxt,
                options: [
                    document.getElementById('opt1').value, 
                    document.getElementById('opt2').value, 
                    document.getElementById('opt3').value, 
                    document.getElementById('opt4').value
                ],
                correct: document.getElementById('ans').value
            });
            alert("Question pushed to Firebase!");
            document.getElementById('q-txt').value = "";
        };

        // Gallery Image Uploader
        window.uploadImg = async () => {
            const file = document.getElementById('img-file').files[0];
            if(!file) return alert("Select a file first");

            const storageRef = ref(storage, 'gallery/' + file.name);
            const snapshot = await uploadBytes(storageRef, file);
            const downloadURL = await getDownloadURL(snapshot.ref);

            await addDoc(collection(db, "gallery"), { url: downloadURL, date: new Date() });
            alert("Image uploaded and added to gallery!");
        };

        // Executive Member Uploader
        window.addExecutive = async () => {
            const name = document.getElementById('ex-name').value;
            const pos = document.getElementById('ex-pos').value;
            if(!name || !pos) return alert("Fill all fields");

            await addDoc(collection(db, "executives"), { name, pos });
            alert("Executive member added!");
        };
    </script>
</body>
</html>
