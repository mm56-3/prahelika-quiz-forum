<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA - MASTER CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 2rem; }
        input, textarea { background: rgba(0, 0, 0, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; width: 100%; padding: 0.8rem; border-radius: 0.75rem; margin-bottom: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #22d3ee !important; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
        .btn-cyan { background: #0891b2; color: white; font-weight: bold; padding: 0.8rem; border-radius: 0.75rem; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-cyan:hover { background: #22d3ee; transform: translateY(-2px); }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); padding: 0.3rem 0.8rem; border-radius: 0.5rem; font-size: 0.75rem; transition: 0.3s; cursor: pointer; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 0.75rem 1rem; border-radius: 0.75rem; margin-top: 0.6rem; border: 1px solid rgba(255,255,255,0.05); }
        .section-tag { border-left: 4px solid #22d3ee; padding-left: 10px; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #22d3ee; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="login-box" class="max-w-md mx-auto mt-20 glass text-center">
        <h1 class="text-3xl font-black mb-8 tracking-tighter uppercase">Admin Access</h1>
        <input type="password" id="admin-pass" placeholder="Master Password">
        <button id="login-btn" class="btn-cyan mt-2">DECRYPT & ENTER</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto space-y-12">
        <div class="flex justify-between items-center border-b border-white/5 pb-8">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter">PRAHELIKA</h1>
                <p class="text-cyan-400 text-xs font-bold uppercase tracking-widest">Master Control Panel</p>
            </div>
            <button onclick="location.reload()" class="bg-white/5 hover:bg-red-500/20 hover:text-red-400 px-4 py-2 rounded-full text-xs font-bold transition">LOGOUT</button>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="glass">
                <h2 class="section-tag">Home Identity</h2>
                <input type="text" id="h-title" placeholder="Site Title">
                <textarea id="h-desc" placeholder="Site Description" class="h-28"></textarea>
                <input type="text" id="h-img" placeholder="Hero Image URL">
                <button id="save-home-btn" class="btn-cyan">UPDATE LIVE SITE</button>
            </div>

            <div class="glass">
                <h2 class="section-tag" style="border-color: #4ade80; color: #4ade80;">Executive Team</h2>
                <div class="flex gap-2">
                    <input type="text" id="ex-name" placeholder="Name">
                    <input type="text" id="ex-pos" placeholder="Position">
                </div>
                <input type="text" id="ex-url" placeholder="Photo Link">
                <button id="add-ex-btn" class="w-full bg-green-600/20 text-green-400 border border-green-600/30 p-3 rounded-xl font-bold hover:bg-green-600 hover:text-white transition">ADD MEMBER</button>
                
                <div class="mt-8">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Live Roster</p>
                    <div id="ex-list" class="max-h-48 overflow-y-auto pr-2"></div>
                </div>
            </div>

            <div class="glass md:col-span-2">
                <h2 class="section-tag" style="border-color: #facc15; color: #facc15;">Quiz Engine</h2>
                <div class="grid md:grid-cols-2 gap-10">
                    <div>
                        <input type="text" id="q-text" placeholder="Question Text">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="q-a" placeholder="Option A">
                            <input type="text" id="q-b" placeholder="Option B">
                            <input type="text" id="q-c" placeholder="Option C">
                            <input type="text" id="q-d" placeholder="Option D">
                        </div>
                        <input type="text" id="q-correct" placeholder="Correct Answer (Exact text)">
                        <button id="add-q-btn" class="btn-cyan !bg-yellow-500 !text-black hover:!bg-yellow-400">SAVE & ADD ANOTHER</button>
                    </div>
                    <div class="border-l border-white/5 pl-6">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Question Bank</p>
                        <div id="q-list" class="max-h-64 overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH ---
        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass').value === '#UDSB784125781005') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                startLiveSync();
            } else { alert("Access Denied"); }
        };

        // --- SYNC DATA (Prevents text from disappearing) ---
        function startLiveSync() {
            // Sync Home
            onSnapshot(doc(db, "website", "data"), (d) => {
                if(d.exists()) {
                    document.getElementById('h-title').value = d.data().title || "";
                    document.getElementById('h-desc').value = d.data().description || "";
                    document.getElementById('h-img').value = d.data().heroImage || "";
                }
            });

            // Sync Members List
            onSnapshot(collection(db, "executives"), (snap) => {
                const list = document.getElementById('ex-list');
                list.innerHTML = "";
                snap.forEach(s => {
                    list.innerHTML += `<div class="list-item">
                        <span class="text-xs font-bold">${s.data().name}</span>
                        <button onclick="deleteThis('executives', '${s.id}')" class="btn-delete">DELETE</button>
                    </div>`;
                });
            });

            // Sync Quiz Questions
            onSnapshot(collection(db, "quiz_questions"), (snap) => {
                const list = document.getElementById('q-list');
                list.innerHTML = "";
                snap.forEach(s => {
                    list.innerHTML += `<div class="list-item">
                        <span class="text-[10px] truncate max-w-[180px] opacity-60">${s.data().text}</span>
                        <button onclick="deleteThis('quiz_questions', '${s.id}')" class="btn-delete">REMOVE</button>
                    </div>`;
                });
            });
        }

        // --- GLOBAL DELETE ---
        window.deleteThis = async (col, id) => {
            if(confirm("Are you sure you want to delete this?")) {
                await deleteDoc(doc(db, col, id));
            }
        };

        // --- SAVE BUTTONS ---
        document.getElementById('save-home-btn').onclick = async () => {
            try {
                await setDoc(doc(db, "website", "data"), {
                    title: document.getElementById('h-title').value,
                    description: document.getElementById('h-desc').value,
                    heroImage: document.getElementById('h-img').value
                }, { merge: true });
                alert("Website Updated!");
            } catch (e) { alert(e.message); }
        };

        document.getElementById('add-ex-btn').onclick = async () => {
            await addDoc(collection(db, "executives"), {
                name: document.getElementById('ex-name').value,
                pos: document.getElementById('ex-pos').value,
                url: document.getElementById('ex-url').value
            });
            document.getElementById('ex-name').value = "";
            document.getElementById('ex-pos').value = "";
            document.getElementById('ex-url').value = "";
        };

        document.getElementById('add-q-btn').onclick = async () => {
            const qTxt = document.getElementById('q-text').value;
            if(!qTxt) return alert("Enter question text");
            
            await addDoc(collection(db, "quiz_questions"), {
                text: qTxt,
                options: [
                    document.getElementById('q-a').value,
                    document.getElementById('q-b').value,
                    document.getElementById('q-c').value,
                    document.getElementById('q-d').value
                ],
                correct: document.getElementById('q-correct').value
            });
            
            // Clear inputs for next question
            ['q-text','q-a','q-b','q-c','q-d','q-correct'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('q-text').focus();
        };
    </script>
</body>
</html>
