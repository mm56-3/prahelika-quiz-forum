<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA - MASTER CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 2rem; border-radius: 1.5rem; }
        input, textarea { background: #000 !important; border: 1px solid #334155 !important; color: white !important; width: 100%; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; outline: none; }
        input:focus { border-color: #22d3ee !important; }
        .btn-delete { background: #ef4444; color: white; padding: 0.25rem 0.75rem; border-radius: 0.4rem; font-size: 0.8rem; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 0.75rem; border-radius: 0.5rem; margin-top: 0.5rem; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="max-w-md mx-auto mt-20 card text-center">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400 uppercase tracking-widest">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="Enter Admin Password">
        <button onclick="checkLogin()" class="w-full bg-cyan-600 p-3 rounded-lg font-bold hover:bg-cyan-500 transition">ENTER DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center border-b border-white/10 pb-5">
            <h1 class="text-3xl font-black text-cyan-400">MASTER CONTROL</h1>
            <button onclick="location.reload()" class="text-red-400 text-sm font-bold">LOGOUT</button>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-cyan-400 border-l-4 border-cyan-400 pl-3">HOMEPAGE HEADER</h2>
            <input type="text" id="h-title" placeholder="Main Title">
            <textarea id="h-desc" placeholder="Description Text" class="h-24"></textarea>
            <input type="text" id="h-img" placeholder="Hero Image URL">
            <button id="save-home-btn" class="w-full bg-cyan-600 p-3 rounded-lg font-bold">UPDATE HOME CONTENT</button>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-green-400 border-l-4 border-green-400 pl-3">MANAGE MEMBERS</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="ex-name" placeholder="Name">
                <input type="text" id="ex-pos" placeholder="Position">
            </div>
            <input type="text" id="ex-url" placeholder="Photo URL">
            <button id="add-ex-btn" class="w-full bg-green-600 p-3 rounded-lg font-bold mb-6">ADD MEMBER</button>
            
            <div id="ex-list-container">
                <h3 class="text-sm font-bold text-gray-500 uppercase mb-2">Current Members:</h3>
                <div id="ex-list"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-yellow-400 border-l-4 border-yellow-400 pl-3">MANAGE QUIZ</h2>
            <input type="text" id="q-text" placeholder="Question">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="q-a" placeholder="Option A">
                <input type="text" id="q-b" placeholder="Option B">
                <input type="text" id="q-c" placeholder="Option C">
                <input type="text" id="q-d" placeholder="Option D">
            </div>
            <input type="text" id="q-correct" placeholder="Correct Answer (Exact text)">
            <button id="add-q-btn" class="w-full bg-yellow-600 p-3 rounded-lg font-bold text-black mb-6">PUBLISH QUESTION</button>
            
            <div id="q-list-container">
                <h3 class="text-sm font-bold text-gray-500 uppercase mb-2">Live Questions:</h3>
                <div id="q-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LOGIN ---
        window.checkLogin = () => {
            const pass = document.getElementById('admin-pass').value;
            if(pass === '#UDSB784125781005') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                startSync();
            } else { alert("Wrong Password!"); }
        };

        function startSync() {
            // 1. Sync Header
            onSnapshot(doc(db, "website", "data"), (d) => {
                if(d.exists()) {
                    document.getElementById('h-title').value = d.data().title || "";
                    document.getElementById('h-desc').value = d.data().description || "";
                    document.getElementById('h-img').value = d.data().heroImage || "";
                }
            });

            // 2. Sync Members List
            onSnapshot(collection(db, "executives"), (snap) => {
                const list = document.getElementById('ex-list');
                list.innerHTML = "";
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    list.innerHTML += `
                        <div class="item-row">
                            <span>${data.name} (${data.pos})</span>
                            <button onclick="deleteItem('executives', '${docSnap.id}')" class="btn-delete">DELETE</button>
                        </div>
                    `;
                });
            });

            // 3. Sync Quiz List
            onSnapshot(collection(db, "quiz_questions"), (snap) => {
                const list = document.getElementById('q-list');
                list.innerHTML = "";
                snap.forEach(docSnap => {
                    list.innerHTML += `
                        <div class="item-row">
                            <span class="truncate pr-4">${docSnap.data().text}</span>
                            <button onclick="deleteItem('quiz_questions', '${docSnap.id}')" class="btn-delete">DELETE</button>
                        </div>
                    `;
                });
            });
        }

        // --- DELETE FUNCTION ---
        window.deleteItem = async (col, id) => {
            if(confirm("Are you sure you want to delete this?")) {
                try {
                    await deleteDoc(doc(db, col, id));
                    alert("Deleted successfully!");
                } catch (e) { alert(e.message); }
            }
        };

        // --- SAVE FUNCTIONS ---
        document.getElementById('save-home-btn').onclick = async () => {
            await setDoc(doc(db, "website", "data"), {
                title: document.getElementById('h-title').value,
                description: document.getElementById('h-desc').value,
                heroImage: document.getElementById('h-img').value
            }, { merge: true });
            alert("Homepage updated!");
        };

        document.getElementById('add-ex-btn').onclick = async () => {
            await addDoc(collection(db, "executives"), {
                name: document.getElementById('ex-name').value,
                pos: document.getElementById('ex-pos').value,
                url: document.getElementById('ex-url').value
            });
            alert("Member added!");
        };

        document.getElementById('add-q-btn').onclick = async () => {
            await addDoc(collection(db, "quiz_questions"), {
                text: document.getElementById('q-text').value,
                options: [
                    document.getElementById('q-a').value,
                    document.getElementById('q-b').value,
                    document.getElementById('q-c').value,
                    document.getElementById('q-d').value
                ],
                correct: document.getElementById('q-correct').value
            });
            alert("Question added!");
        };
    </script>
</body>
</html>
