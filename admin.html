<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHELIKA - ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea { background: #000 !important; border: 1px solid #334155 !important; color: white !important; }
        .section-title { border-left: 4px solid #22d3ee; padding-left: 12px; margin-bottom: 16px; font-weight: bold; text-transform: uppercase; color: #22d3ee; }
        .list-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-delete { color: #f87171; font-size: 12px; font-weight: bold; border: 1px solid #f87171; padding: 2px 8px; border-radius: 4px; transition: 0.3s; }
        .btn-delete:hover { background: #f87171; color: white; }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="max-w-md mx-auto mt-20 p-8 card rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-cyan-400 text-center uppercase tracking-widest">Admin Login</h1>
        <input type="text" id="admin-user" placeholder="Username" class="w-full p-3 mb-4 rounded-lg outline-none focus:border-cyan-500">
        <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 mb-6 rounded-lg outline-none focus:border-cyan-500">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition">ENTER DASHBOARD</button>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h1 class="text-3xl font-black text-cyan-400 uppercase">Master Control Panel</h1>
            <button onclick="location.reload()" class="bg-red-900/40 text-red-400 px-4 py-1 rounded-full text-xs hover:bg-red-600 hover:text-white transition">Logout</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="card p-6 rounded-2xl">
                <h2 class="section-title">1. Website Header</h2>
                <input type="text" id="h-title" placeholder="Hero Title" class="w-full p-2 mb-2 rounded">
                <textarea id="h-desc" placeholder="Description Text" class="w-full p-2 mb-2 rounded h-20"></textarea>
                <input type="text" id="h-img" placeholder="Hero Image URL" class="w-full p-2 mb-4 rounded">
                <button id="save-home-btn" class="w-full bg-cyan-600 p-3 rounded-lg font-bold">UPDATE HOME CONTENT</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="section-title" style="border-color: #a855f7;">2. Gallery Management</h2>
                <textarea id="gallery-urls" placeholder="link1.jpg, link2.png" class="w-full p-2 mb-4 rounded h-32"></textarea>
                <button id="save-gallery-btn" class="w-full bg-purple-600 p-3 rounded-lg font-bold">REPLACE ALL IMAGES</button>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="section-title" style="border-color: #4ade80;">3. Add Executive</h2>
                <input type="text" id="ex-name" placeholder="Full Name" class="w-full p-2 mb-2 rounded">
                <input type="text" id="ex-pos" placeholder="Position" class="w-full p-2 mb-2 rounded">
                <input type="text" id="ex-url" placeholder="Photo URL" class="w-full p-2 mb-4 rounded">
                <button id="add-ex-btn" class="w-full bg-green-600 p-3 rounded-lg font-bold mb-4">ADD NEW MEMBER</button>
                
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Live Roster (Delete Below)</p>
                <div id="ex-list" class="max-h-40 overflow-y-auto pr-2"></div>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="section-title" style="border-color: #f472b6;">4. Contact & Socials</h2>
                <input type="text" id="c-phone" placeholder="Phone Number" class="w-full p-2 mb-2 rounded">
                <input type="text" id="c-fb" placeholder="Facebook URL" class="w-full p-2 mb-2 rounded">
                <input type="text" id="c-ig" placeholder="Instagram URL" class="w-full p-2 mb-2 rounded">
                <input type="text" id="c-yt" placeholder="YouTube URL" class="w-full p-2 mb-4 rounded">
                <button id="save-contact-btn" class="w-full bg-pink-600 p-3 rounded-lg font-bold">SAVE ALL CONTACTS</button>
            </div>

            <div class="card p-6 rounded-2xl md:col-span-2">
                <h2 class="section-title" style="border-color: #facc15;">5. Quiz Question Builder</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <input type="text" id="q-text" placeholder="Question Text" class="w-full p-2 mb-2 rounded">
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <input type="text" id="q-a" placeholder="Option A" class="p-2 rounded">
                            <input type="text" id="q-b" placeholder="Option B" class="p-2 rounded">
                            <input type="text" id="q-c" placeholder="Option C" class="p-2 rounded">
                            <input type="text" id="q-d" placeholder="Option D" class="p-2 rounded">
                        </div>
                        <input type="text" id="q-correct" placeholder="Correct Answer" class="w-full p-2 mb-4 rounded">
                        <button id="add-q-btn" class="w-full bg-yellow-600 p-3 rounded-lg font-bold text-black">SAVE & ADD ANOTHER</button>
                    </div>
                    <div class="border-l border-white/10 pl-4">
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Question Bank (Delete Below)</p>
                        <div id="q-list" class="max-h-60 overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALoQVj8SWPI_S5PUJ1f_7dw4uKGLh68Lw",
            authDomain: "prahelika-fbf98.firebaseapp.com",
            projectId: "prahelika-fbf98",
            storageBucket: "prahelika-fbf98.firebasestorage.app",
            messagingSenderId: "21670057223",
            appId: "1:21670057223:web:d20225509d824505cb61a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH ---
        document.getElementById('login-btn').onclick = () => {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            if(user === 'VIKRAM784125' && pass === '#UDSB784125781005') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                syncData();
            } else { alert("Invalid login!"); }
        };

        function syncData() {
            // Load Context automatically
            onSnapshot(doc(db, "website", "data"), (d) => { if(d.exists()) {
                document.getElementById('h-title').value = d.data().title || "";
                document.getElementById('h-desc').value = d.data().description || "";
                document.getElementById('h-img').value = d.data().heroImage || "";
            }});
            onSnapshot(doc(db, "website", "gallery"), (d) => { if(d.exists()) {
                document.getElementById('gallery-urls').value = (d.data().images || []).join(', ');
            }});
            onSnapshot(doc(db, "website", "contact"), (d) => { if(d.exists()) {
                document.getElementById('c-phone').value = d.data().phone || "";
                document.getElementById('c-fb').value = d.data().facebook || "";
                document.getElementById('c-ig').value = d.data().instagram || "";
                document.getElementById('c-yt').value = d.data().youtube || "";
            }});
            // List Sync
            onSnapshot(collection(db, "executives"), (snap) => {
                const list = document.getElementById('ex-list'); list.innerHTML = "";
                snap.forEach(s => list.innerHTML += `<div class="list-item"><span>${s.data().name}</span><button onclick="delDoc('executives','${s.id}')" class="btn-delete">DELETE</button></div>`);
            });
            onSnapshot(collection(db, "quiz_questions"), (snap) => {
                const list = document.getElementById('q-list'); list.innerHTML = "";
                snap.forEach(s => list.innerHTML += `<div class="list-item"><span class="truncate pr-4">${s.data().text}</span><button onclick="delDoc('quiz_questions','${s.id}')" class="btn-delete">DELETE</button></div>`);
            });
        }

        window.delDoc = async (col, id) => { if(confirm("Permanently delete?")) await deleteDoc(doc(db, col, id)); };

        // --- ACTIONS ---
        document.getElementById('save-home-btn').onclick = async () => {
            await setDoc(doc(db, "website", "data"), { title: document.getElementById('h-title').value, description: document.getElementById('h-desc').value, heroImage: document.getElementById('h-img').value }, { merge: true });
            alert("Header Updated!");
        };
        document.getElementById('save-gallery-btn').onclick = async () => {
            const urls = document.getElementById('gallery-urls').value.split(',').map(u => u.trim()).filter(u => u !== "");
            await setDoc(doc(db, "website", "gallery"), { images: urls });
            alert("Gallery Updated!");
        };
        document.getElementById('save-contact-btn').onclick = async () => {
            await setDoc(doc(db, "website", "contact"), { phone: document.getElementById('c-phone').value, facebook: document.getElementById('c-fb').value, instagram: document.getElementById('c-ig').value, youtube: document.getElementById('c-yt').value }, { merge: true });
            alert("Contact Updated!");
        };
        document.getElementById('add-ex-btn').onclick = async () => {
            await addDoc(collection(db, "executives"), { name: document.getElementById('ex-name').value, pos: document.getElementById('ex-pos').value, url: document.getElementById('ex-url').value });
            ['ex-name','ex-pos','ex-url'].forEach(i => document.getElementById(i).value = "");
        };
        document.getElementById('add-q-btn').onclick = async () => {
            await addDoc(collection(db, "quiz_questions"), { text: document.getElementById('q-text').value, options: [document.getElementById('q-a').value, document.getElementById('q-b').value, document.getElementById('q-c').value, document.getElementById('q-d').value], correct: document.getElementById('q-correct').value });
            ['q-text','q-a','q-b','q-c','q-d','q-correct'].forEach(i => document.getElementById(i).value = "");
            document.getElementById('q-text').focus();
        };
    </script>
</body>
</html>
