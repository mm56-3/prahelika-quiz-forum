<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel | Prahelika</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div id="auth">
        <input type="text" id="adminU" placeholder="User" class="text-black p-2">
        <input type="password" id="adminP" placeholder="Pass" class="text-black p-2">
        <button onclick="login()">Login</button>
    </div>

    <div id="cms" class="hidden">
        <h1 class="text-4xl font-bold mb-10">Admin CMS Dashboard</h1>
        
        <div class="bg-white/5 p-6 rounded-xl mb-10">
            <h2 class="text-xl mb-4 text-cyan-400">Add MCQ Question</h2>
            <input type="text" id="q-txt" placeholder="Question Text" class="w-full p-3 bg-slate-800 mb-2">
            <input type="text" id="opt-1" placeholder="Option 1" class="w-full p-2 bg-slate-800 mb-2">
            <button onclick="uploadQuestion()" class="bg-cyan-500 p-3 rounded">Save Question</button>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('adminU').value === 'VIKRAM784125' && 
               document.getElementById('adminP').value === '#UDSB784125781005') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('cms').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
