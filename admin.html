<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#0072ff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Prahelika Admin Panel</h1>

<input id="adminUser" placeholder="Username">
<input id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="dashboard" style="display:none">

<h2>Upload Logo</h2>
<input id="logoUrl" placeholder="Logo URL">
<button onclick="setLogo()">Update Logo</button>

<h2>Homepage Description</h2>
<textarea id="homeText"></textarea>
<br>
<button onclick="updateHome()">Update Text</button>

<hr>

<h2>Add Quiz Question</h2>

<input id="q">
<input id="a">
<input id="b">
<input id="c">
<input id="d">
<input id="ans">

<button onclick="addQuestion()">Add</button>

<hr>

<h2>Add Gallery Image</h2>

<input id="galleryUrl">
<button onclick="addGallery()">Add</button>

<hr>

<h2>Add Achievement Image</h2>

<input id="achUrl">
<button onclick="addAchievement()">Add</button>

<hr>

<h2>Add Executive Member</h2>

<input id="mname">
<input id="mphoto">
<input id="mrole">

<button onclick="addMember()">Add</button>

</div>

<script src="app.js"></script>

</body>
</html>
